global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: vmsingle
    static_configs:
      - targets: ["127.0.0.1:8428"]
        labels:
          instance: vault-rag-vmsingle

  - job_name: node
    static_configs:
      - targets: ["vault-rag-node-exporter:9100"]
        labels:
          instance: vault-rag-host

  - job_name: cadvisor
    static_configs:
      - targets: ["vault-rag-cadvisor:8080"]
        labels:
          instance: vault-rag-host

  - job_name: postgres
    static_configs:
      - targets: ["vault-rag-postgres-exporter:9187"]
        labels:
          instance: vault-rag-postgres
