apiVersion: 1

datasources:
  - name: vault-rag-pg
    type: postgres
    uid: vault-rag-pg
    access: proxy
    url: vault-rag-postgres:5432
    user: vaultrag_grafana
    database: vault_rag
    isDefault: false
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 4
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: ${VAULT_RAG_GRAFANA_PASS}
