name: agent-fleet-daemon release

on:
  push:
    tags:
      - 'daemon-v*'        # daemon-v0.1.0, daemon-v0.2.0, …
  workflow_dispatch:        # manual trigger from the UI
    inputs:
      version:
        description: 'Version override (e.g. 0.2.0). Defaults to package.json.'
        required: false

permissions:
  contents: write           # to attach artifacts to the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Override version (if dispatched manually)
        if: ${{ github.event.inputs.version != '' }}
        working-directory: agent-fleet/daemon
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Install dpkg + rpm tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg rpm

      - name: Build artifacts
        working-directory: agent-fleet/daemon
        run: bash packaging/build.sh --all

      - name: Show artifacts
        run: ls -la agent-fleet/daemon/dist/

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/daemon-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-fleet/daemon/dist/agent-fleet-daemon.tar.gz
            agent-fleet/daemon/dist/agent-fleet-daemon_*_amd64.deb
            agent-fleet/daemon/dist/agent-fleet-daemon-*-1.noarch.rpm

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: agent-fleet-daemon-${{ github.sha }}
          path: agent-fleet/daemon/dist/*
          retention-days: 30
