x-logging: &default-logging
  # vt-0265: switched from json-file to local. The local driver
  # natively gzips rotated chunks and the 'max-size' + 'max-file'
  # combo is honoured properly without needing host-level logrotate
  # copytruncate (which lost lines and confused Promtail/Vector
  # readers that follow file positions). 7 files × 10 MiB ≈ ~70 MiB
  # uncompressed budget per container, compressed in practice 5-15 MiB.
  # `docker logs` keeps working transparently.
  driver: local
  options:
    max-size: "10m"
    max-file: "7"

services:
  vault-rag-ollama:
    # vt-0281: pinned by digest. Update via `docker pull ollama/ollama:latest && docker inspect --format='{{index .RepoDigests 0}}'` then commit.
    image: ollama/ollama:latest@sha256:6077dbbd6508dce8973f8b91c30d8026b1279ab0483e15f0dfad469dba676c2f
    container_name: vault-rag-ollama
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 800m
    memswap_limit: 1500m
    # vt-0135: prevent setuid binaries inside the image from escalating.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - vault-rag-ollama-data:/root/.ollama
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  vault-rag-postgres:
    # vt-0281: pinned by digest.
    image: pgvector/pgvector:pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    container_name: vault-rag-postgres
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 400m
    memswap_limit: 800m
    shm_size: 128m
    # vt-0135: postgres image drops to its own user internally but needs a few
    # caps to chown data dir on first init.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
    environment:
      - POSTGRES_USER=${VAULT_RAG_PG_USER}
      - POSTGRES_PASSWORD=${VAULT_RAG_PG_PASSWORD}
      - POSTGRES_DB=vault_rag
    volumes:
      - vault-rag-pgdata:/var/lib/postgresql/data
      # vt-0272: backup target. Daily pg_dump lands here; host bind-mount
      # so we can rsync/scp off-host. Retention managed by the ofelia job.
      - /var/backups/vault-rag:/backups:rw
    networks:
      - vault-rag-net
    labels:
      # vt-0272: daily pg_dump at 03:30 UTC. Custom format + compression
      # (-Fc + -Z 6). Output goes to /backups/vault_rag-YYYY-MM-DD.dump
      # (host: /var/backups/vault-rag/). Retention 30d enforced by
      # cleanup loop in the same command.
      ofelia.enabled: "true"
      ofelia.job-exec.pg-backup.schedule: "0 30 3 * * *"
      ofelia.job-exec.pg-backup.command: "/bin/sh -c 'set -e; D=$(date -u +%F); F=/backups/vault_rag-$D.dump; pg_dump -U $POSTGRES_USER -d vault_rag -Fc -Z 6 -f $F.tmp && mv $F.tmp $F && chmod 0640 $F && find /backups -name vault_rag-*.dump -mtime +30 -delete; echo backup_ok $F $(stat -c%s $F) bytes'"
      ofelia.job-exec.pg-backup.no-overlap: "true"
      # vt-0273: weekly DR smoke. Verify the latest dump is *readable*
      # by pg_restore --list — catches corrupt dump files (truncated by
      # disk-full or interrupted pg_dump). NOT a full DR test (that
      # requires a disposable pg + age decrypt); operator runs
      # tests/dr-restore.sh manually before major releases.
      ofelia.job-exec.pg-backup-verify.schedule: "0 0 4 * * 0"
      ofelia.job-exec.pg-backup-verify.command: "/bin/sh -c 'set -e; LATEST=$(ls -1t /backups/vault_rag-*.dump 2>/dev/null | head -1); if [ -z \"$LATEST\" ]; then echo NO_BACKUPS; exit 1; fi; pg_restore --list \"$LATEST\" > /dev/null && echo dr_smoke_ok $LATEST'"
      ofelia.job-exec.pg-backup-verify.no-overlap: "true"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VAULT_RAG_PG_USER} -d vault_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-rag-api:
    image: vault-rag-tools:latest
    container_name: vault-rag-api
    hostname: vault-rag-api
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 200m
    memswap_limit: 400m
    # vt-0137: dropped root. Host's /root/obsidian-vault is now chowned to
    # 1000:1000 + scoped deploy key at /opt/vault-rag/.secrets/git_deploy.key.
    # No more /root/.ssh mount — container can't reach the host's primary
    # SSH key any more.
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
      vault-rag-secrets:
        condition: service_healthy
    entrypoint: ["/sbin/tini", "--", "node", "/scripts/rag-api.js"]
    environment:
      - OLLAMA_HOST=http://vault-rag-ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - VAULT_RAG_PG_HOST=vault-rag-postgres
      - VAULT_RAG_PG_DB=vault_rag
      - VAULT_RAG_PG_USER=${VAULT_RAG_PG_USER}
      - VAULT_RAG_PG_PASS=${VAULT_RAG_PG_PASSWORD}
      - VAULT_RAG_API_TOKEN=${VAULT_RAG_API_TOKEN}
      - VAULT_PATH=/vault
      # Git auto-sync (used by lib/git-sync.js). vt-0137: HOME points at the
      # tmpfs-backed dir we mount below, and a scoped deploy key replaces
      # /root/.ssh. safe.directory accepts the bind-mounted /vault path.
      - HOME=/home/app
      - GIT_SSH_COMMAND=ssh -i /run/secrets/git_deploy.key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/home/app/.ssh/known_hosts
      - GIT_AUTHOR_NAME=vault-rag-api
      - GIT_AUTHOR_EMAIL=vault-rag-api@brain.local
      - GIT_COMMITTER_NAME=vault-rag-api
      - GIT_COMMITTER_EMAIL=vault-rag-api@brain.local
      - GIT_CONFIG_GLOBAL=/home/app/.gitconfig
      # vt-0134: secrets handled by the standalone vault-rag-secrets service
      # (age.key + push creds live there, NOT here). Rag-api proxies to it
      # via VAULT_RAG_SECRETS_URL. Falls back to in-process handler if unset.
      - VAULT_RAG_SECRETS_URL=http://vault-rag-secrets:5682
      - VAULT_RAG_SECRETS_TOKEN=${VAULT_RAG_SECRETS_TOKEN}
      # vt-0140: tokmon ingest endpoint at /api/tokmon/ingest reuses the
      # same VAULT_RAG_TOKMON_INGEST_TOKEN the legacy :5681 server used.
      - VAULT_RAG_TOKMON_INGEST_TOKEN=${VAULT_RAG_TOKMON_INGEST_TOKEN}
    ports:
      - "127.0.0.1:5679:5679"
    tmpfs:
      # vt-0137: writable scratch for the non-root user's $HOME (gitconfig,
      # known_hosts, ssh control sockets).
      - /home/app:uid=1000,gid=1000,mode=0700,size=8m
    volumes:
      # vt-0134: removed /opt/vault-rag/.secrets/age.key — now mounted ONLY
      # into vault-rag-secrets. RCE in rag-api can no longer decrypt secrets.
      # vt-0137: /root/.ssh dropped → /run/secrets/git_deploy.key (1000:1000)
      # is the only outbound SSH credential. Scoped to push-only Forgejo
      # access (operator can rotate it independently of the host's SSH key).
      - /root/obsidian-vault:/vault:rw
      - ./scripts:/scripts:ro
      - ./agent-fleet:/agent-fleet:ro
      - ./workflow-templates:/workflow-templates:ro
      - /opt/vault-rag/.secrets/git_deploy.key:/run/secrets/git_deploy.key:ro
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5679/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  vault-rag-tools:
    image: vault-rag-tools:latest
    container_name: vault-rag-tools
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 256m
    # vt-0137: dropped root (same setup as vault-rag-api).
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://vault-rag-ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - VAULT_RAG_PG_HOST=vault-rag-postgres
      - VAULT_RAG_PG_DB=vault_rag
      - VAULT_RAG_PG_USER=${VAULT_RAG_PG_USER}
      - VAULT_RAG_PG_PASS=${VAULT_RAG_PG_PASSWORD}
      - VAULT_RAG_API_TOKEN=${VAULT_RAG_API_TOKEN}
      - VAULT_PATH=/vault
      - VAULT_GIT_REMOTE=${VAULT_GIT_REMOTE:-}
      # vt-0137: non-root user + scoped deploy key (replaces /root/.ssh mount).
      - HOME=/home/app
      - GIT_SSH_COMMAND=ssh -i /run/secrets/git_deploy.key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/home/app/.ssh/known_hosts
      - GIT_CONFIG_GLOBAL=/home/app/.gitconfig
    tmpfs:
      - /home/app:uid=1000,gid=1000,mode=0700,size=8m
    volumes:
      - /root/obsidian-vault:/vault:rw
      - ./scripts:/scripts:ro
      - /opt/vault-rag/.secrets/git_deploy.key:/run/secrets/git_deploy.key:ro
    networks:
      - vault-rag-net
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.vault-indexer.schedule: "${VAULT_INDEXER_SCHEDULE:-@every 5m}"
      ofelia.job-exec.vault-indexer.command: "node /scripts/run-job.js vault-indexer node /scripts/vault-indexer.js"
      ofelia.job-exec.vault-indexer.no-overlap: "true"
      ofelia.job-exec.watchdog-stuck-jobs.schedule: "@every 5m"
      ofelia.job-exec.watchdog-stuck-jobs.command: "node /scripts/watchdog-stuck-jobs.js"
      ofelia.job-exec.watchdog-stuck-jobs.no-overlap: "true"
      ofelia.job-exec.cleanup-vault-audit.schedule: "0 0 4 * * 0"
      ofelia.job-exec.cleanup-vault-audit.command: "node /scripts/cleanup-vault-audit.js"
      ofelia.job-exec.cleanup-vault-audit.no-overlap: "true"
    healthcheck:
      test: ["CMD-SHELL", "test -d /scripts && node --version >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  vault-rag-ofelia:
    # vt-0281: pinned by digest. Replaces the moving :latest tag.
    image: mcuadros/ofelia:latest@sha256:efcbe2c5cf658a25de6443c1462d653f9cc03791d642e01fc6c638a00f97e492
    container_name: vault-rag-ofelia
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 32m
    memswap_limit: 64m
    # vt-0135: ofelia talks to /var/run/docker.sock — that's already a huge
    # privilege escalation surface (controls all containers on the host), so
    # additional cap_drop doesn't materially help. Just lock new-privs.
    security_opt:
      - no-new-privileges:true
    command: daemon --docker
    depends_on:
      - vault-rag-tools
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vault-rag-net
    labels:
      ofelia.enabled: "false"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f /usr/bin/ofelia >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  vault-rag-forgejo:
    # vt-0281: pinned by digest.
    image: codeberg.org/forgejo/forgejo:9@sha256:3c34f11fe8b9983096eef3f8f25c2d2c21c4ae7504960cb203f0b075d1d8ed73
    container_name: vault-rag-forgejo
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 512m
    # vt-0135: forgejo's entrypoint chowns its data dir + drops to its own user.
    # SYS_CHROOT is required by the bundled OpenSSH (preauth chroot to /var/empty).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - SYS_CHROOT
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__DOMAIN=${VAULT_RAG_DOMAIN}
      - FORGEJO__server__ROOT_URL=https://${VAULT_RAG_DOMAIN}/git/
      - FORGEJO__server__SSH_DOMAIN=${VAULT_RAG_DOMAIN}
      - FORGEJO__server__SSH_PORT=222
      - FORGEJO__server__SSH_LISTEN_PORT=22
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__OFFLINE_MODE=true
      - FORGEJO__server__LFS_START_SERVER=false
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=true
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=vault-rag-postgres:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=${VAULT_RAG_PG_USER}
      - FORGEJO__database__PASSWD=${VAULT_RAG_PG_PASSWORD}
    ports:
      - "127.0.0.1:3000:3000"
      # H7 was reverted: loopback bind broke vault-rag-secrets / -api git
      # operations against the vault remote ssh://git@<host>:222. Containers
      # reach the host via the docker bridge gateway IP, NOT 127.0.0.1, so
      # 127.0.0.1:222 is unreachable from inside.
      # Forgejo SSH is key-only + REQUIRE_SIGNIN + DISABLE_REGISTRATION; the
      # exposure surface is small. Filed as vt-0138 for a proper fix
      # (either firewall whitelist, or switch vault remote to use the
      # internal docker hostname).
      - "222:22"
    volumes:
      - vault-rag-forgejo-data:/data
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # vt-0134: dedicated secrets service. Holds age.key + push creds + vault.age
  # write access. ONLY exposes /secrets/{get,list,set,delete,rotate,verify} over
  # the internal docker network on :5682, gated by VAULT_RAG_SECRETS_TOKEN.
  # NOT exposed to host, NOT proxied by Caddy. rag-api is the only caller.
  vault-rag-secrets:
    image: vault-rag-tools:latest
    container_name: vault-rag-secrets
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 100m
    memswap_limit: 200m
    # vt-0137: dropped root. age.key + git_deploy.key are 1000:1000 on host.
    user: "1000:1000"
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
    entrypoint: ["/sbin/tini", "--", "node", "/scripts/secrets-server.js"]
    environment:
      - PORT=5682
      - VAULT_RAG_SECRETS_TOKEN=${VAULT_RAG_SECRETS_TOKEN}
      - VAULT_AGE_KEY_PATH=/run/secrets/age.key
      - VAULT_REPO_PATH=/vault
      - VAULT_AGE_PATH=/vault/secrets/vault.age
      - VAULT_RECIPIENTS_PATH=/vault/secrets/recipients
      - HOME=/home/app
      - GIT_SSH_COMMAND=ssh -i /run/secrets/git_deploy.key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/home/app/.ssh/known_hosts
      - GIT_CONFIG_GLOBAL=/home/app/.gitconfig
      - GIT_AUTHOR_NAME=vault-rag-secrets
      - GIT_AUTHOR_EMAIL=vault-rag-secrets@brain.local
      - GIT_COMMITTER_NAME=vault-rag-secrets
      - GIT_COMMITTER_EMAIL=vault-rag-secrets@brain.local
    tmpfs:
      - /home/app:uid=1000,gid=1000,mode=0700,size=8m
    volumes:
      - /root/obsidian-vault:/vault:rw
      - ./scripts:/scripts:ro
      - /opt/vault-rag/.secrets/age.key:/run/secrets/age.key:ro
      - /opt/vault-rag/.secrets/git_deploy.key:/run/secrets/git_deploy.key:ro
    networks:
      - vault-rag-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5682/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  vault-rag-mcp:
    image: vault-rag-tools:latest
    container_name: vault-rag-mcp
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 100m
    memswap_limit: 200m
    # vt-0135: mcp-shim only reads ./scripts:ro and talks HTTP to rag-api —
    # no host write surface. Drop root.
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=16m
      - /home/app:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-api:
        condition: service_started
    entrypoint: ["/sbin/tini", "--", "node", "/scripts/mcp-shim.js"]
    environment:
      - MCP_PORT=5680
      - VAULT_RAG_MCP_TOKEN=${VAULT_RAG_MCP_TOKEN}
      - VAULT_RAG_API_TOKEN=${VAULT_RAG_API_TOKEN}
      - RAG_API_URL=http://vault-rag-api:5679
    ports:
      - "127.0.0.1:5680:5680"
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5680/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3



  vault-rag-tokmon-ingest:
    # vt-0140: deprecated standalone service. rag-api now exposes
    #   POST /api/tokmon/ingest
    # at port 5679 with the same auth (X-Tokmon-Token / Bearer
    # VAULT_RAG_TOKMON_INGEST_TOKEN). Daemon hosts use the new
    # tokmon-watcher (AGENT_FLEET_TOKMON_ENABLED=1) instead of an
    # external shipper. External shippers still bound to :5681 can be
    # re-enabled for one release window via:
    #   docker compose --profile tokmon-legacy up -d vault-rag-tokmon-ingest
    profiles: ["tokmon-legacy"]
    image: vault-rag-tools:latest
    container_name: vault-rag-tokmon-ingest
    logging: *default-logging
    ports:
      - "127.0.0.1:5681:5681"
    restart: unless-stopped
    mem_limit: 100m
    memswap_limit: 200m
    # vt-0135: only mounts ./scripts:ro + talks pg → no host write surface.
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=16m
      - /home/app:size=4m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
    entrypoint: ["/sbin/tini", "--", "node", "/scripts/tokmon-ingest.js"]
    environment:
      - PORT=5681
      - TOKMON_INGEST_TOKEN=${VAULT_RAG_TOKMON_INGEST_TOKEN}
      - TOKMON_PG_HOST=vault-rag-postgres
      - TOKMON_PG_DB=tokmon
      - TOKMON_PG_USER=tokmon_parser
      - TOKMON_PG_PASS=${VAULT_RAG_TOKMON_PARSER_PASS}
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5681/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  vault-rag-grafana:
    profiles: ["monitoring"]   # vt-0112: agent-fleet UI covers cost+host metrics; bring back with --profile monitoring
    # vt-0281: pinned by digest.
    image: grafana/grafana:11.3.0@sha256:a0f881232a6fb71a0554a47d0fe2203b6888fe77f4cefb7ea62bed7eb54e13c3
    container_name: vault-rag-grafana
    logging: *default-logging
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    mem_limit: 250m
    memswap_limit: 500m
    # vt-0135: drop explicit root override — grafana image runs as uid 472:0
    # by default which is fine for its volumes.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${VAULT_RAG_GRAFANA_ADMIN_PASS}
      - GF_SERVER_ROOT_URL=https://${VAULT_RAG_DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_HTTP_PORT=3000
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_INSTALL_PLUGINS=
      - VAULT_RAG_TOKMON_GRAFANA_PASS=${VAULT_RAG_TOKMON_GRAFANA_PASS}
      - VAULT_RAG_GRAFANA_PASS=${VAULT_RAG_GRAFANA_PASS}
    volumes:
      - vault-rag-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5


  vault-rag-vmsingle:
    profiles: ["monitoring"]
    # vt-0281: pinned by digest.
    image: victoriametrics/victoria-metrics:v1.108.1@sha256:f6e5322b315795ae2fec494c1d1c94b2e0325b789fead60ef3a13fccdefcd81e
    container_name: vault-rag-vmsingle
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 150m
    memswap_limit: 300m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=14d"
      - "-promscrape.config=/etc/scrape.yml"
      - "-httpListenAddr=:8428"
      - "-memory.allowedPercent=60"
    volumes:
      - vault-rag-vmdata:/storage
      - ./prometheus/scrape.yml:/etc/scrape.yml:ro
    ports:
      - "127.0.0.1:8428:8428"
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # vt-0274: vmalert evaluates baseline.yml rules every 30s and POSTs
  # firing alerts to VAULT_RAG_ALERT_WEBHOOK_URL. No alertmanager: for
  # personal/team scale routing + dedup is overkill; the operator
  # configures a single webhook (telegram bot, slack, pagerduty, etc.).
  vault-rag-vmalert:
    profiles: ["monitoring"]
    image: victoriametrics/vmalert:v1.108.1
    container_name: vault-rag-vmalert
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 80m
    memswap_limit: 160m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-vmsingle:
        condition: service_healthy
    command:
      - "-datasource.url=http://vault-rag-vmsingle:8428"
      - "-remoteWrite.url=http://vault-rag-vmsingle:8428"
      - "-rule=/etc/alerts/*.yml"
      - "-notifier.url=${VAULT_RAG_ALERT_WEBHOOK_URL:-http://vault-rag-api:5679/fleet/_alert-sink}"
      - "-evaluationInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ./agent-fleet/alerts:/etc/alerts:ro
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8880/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  vault-rag-node-exporter:
    profiles: ["monitoring"]
    # vt-0281: pinned by digest.
    image: prom/node-exporter:v1.8.2@sha256:4032c6d5bfd752342c3e631c2f1de93ba6b86c41db6b167b9a35372c139e7706
    container_name: vault-rag-node-exporter
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 50m
    memswap_limit: 100m
    pid: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # SYS_PTRACE so the process can read /proc/<pid>/* of other processes
      # under pid:host (its core purpose).
      - SYS_PTRACE
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/.+)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  vault-rag-cadvisor:
    profiles: ["monitoring"]
    # vt-0281: pinned by digest.
    image: gcr.io/cadvisor/cadvisor:v0.49.1@sha256:3cde6faf0791ebf7b41d6f8ae7145466fed712ea6f252c935294d2608b1af388
    container_name: vault-rag-cadvisor
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 150m
    memswap_limit: 300m
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - vault-rag-net

  vault-rag-postgres-exporter:
    profiles: ["monitoring"]
    # vt-0281: pinned by digest.
    image: prometheuscommunity/postgres-exporter:v0.15.0@sha256:386b12d19eab2a37d7cd8ca8b4c7491cc7a830d9581f49af6c98a393da9605e6
    container_name: vault-rag-postgres-exporter
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 60m
    memswap_limit: 120m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      vault-rag-postgres:
        condition: service_healthy
    environment:
      - DATA_SOURCE_NAME=postgresql://${VAULT_RAG_PG_USER}:${VAULT_RAG_PG_PASSWORD}@vault-rag-postgres:5432/vault_rag?sslmode=disable
      - PG_EXPORTER_EXTEND_QUERY_PATH=/queries.yaml
    volumes:
      - ./sql/queries.yaml:/queries.yaml:ro
    networks:
      - vault-rag-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9187/metrics >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3

  vault-rag-caddy:
    image: vault-rag-caddy:2.11-rl
    container_name: vault-rag-caddy
    logging: *default-logging
    restart: unless-stopped
    mem_limit: 150m
    memswap_limit: 300m
    network_mode: host
    # vt-0135: host mode → caddy binds 80/443 (privileged ports) on the host.
    # Keep NET_BIND_SERVICE; drop everything else.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - vault-rag-caddy-data:/data
      - vault-rag-caddy-config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/reverse_proxy/upstreams >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vault-rag-grafana-data:
  vault-rag-pgdata:
  vault-rag-ollama-data:
  vault-rag-forgejo-data:
  vault-rag-vmdata:
  vault-rag-caddy-data:
  vault-rag-caddy-config:

networks:
  vault-rag-net:
    name: vault-rag-net
